    <h1 class="title topictitle1">发版说明</h1>

    
    <div class="body conbody"><p class="shortdesc">本章节主要介绍工具各版本的更新情况。</p>

        <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_FJD_HHW_3ZB">
            <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-ECF1DCB7-7B90-4BD4-9440-D99731CCC6E3">
                <p class="p"><a class="xref" href="#GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-E76880B8-C5D3-4291-8745-44126A15B915">V4.4.0</a></p>

            </li>

            <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-552120CA-1D32-414F-82B0-95F4D4D29475">
                <p class="p"><a class="xref" href="#GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-9F0753E4-27F2-4DB0-AAD8-3B42545DC650">V4.3.0</a></p>

            </li>

            <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-DBE021CD-2422-402B-A96B-5A889C9F5694">
                <p class="p"><a class="xref" href="#GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-ABC39061-ACFB-4590-A132-C5E3A8A58BC0">V4.2.0</a></p>

            </li>

        </ul>

        <div class="section" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-E76880B8-C5D3-4291-8745-44126A15B915"><h2 class="title sectiontitle">V4.4.0 </h2>
            
            <p class="p">该版本发布于2024年8月。</p>

            <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_WSY_THN_HCC">
                <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-28407FF3-6A7C-4F2D-B07D-4A59DFFC7BE1">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_OBX_5HN_HCC">
                        <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-35A570D2-9D1D-424A-93DD-1C75AEBAF844">
                            <p class="p">定位异常IO新增定位条件，具体请见<a class="xref" href="GUID-BD4DD799-6380-4F1F-AC77-80BCAF778BFC.html#GUID-BD4DD799-6380-4F1F-AC77-80BCAF778BFC" title="事件图处解析后的事件通过IO波形图可查看相应IO的响应波形图，可对该事件下的脉冲数量进行实时统计。">IO波形监测</a>。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-9F0753E4-27F2-4DB0-AAD8-3B42545DC650"><h2 class="title sectiontitle">V4.3.0</h2>
            
            <p class="p">该版本发布于2023年11月。</p>

            <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_JGQ_5GW_3ZB">
                <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-445CF518-BA28-4BFB-8E80-803FA2EE60BF">
                    <p class="p">其他：</p>

                    <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_QJH_VGW_3ZB">
                        <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-43124229-4C14-4E8E-8F80-2A65F83EFF5B">
                            <p class="p">跟随客户端进行版本迭代。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-ABC39061-ACFB-4590-A132-C5E3A8A58BC0"><h2 class="title sectiontitle">V4.2.0</h2>
            
            <p class="p">该版本发布于2023年6月。</p>

            <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_PX2_1TN_HZB">
                <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-55F62123-9085-4211-A08C-5F7A5AEFD719">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__UL_M4Z_1TN_HZB">
                        <li class="li" id="GUID-ADD54E75-9C0C-4E83-8678-6EB32FD23695__GUID-66C3D35A-6738-4697-8E26-A1BA2A4FB5BD">
                            <p class="p">提供设备诊断工具实时监测设备的运行状态，包括IO波形监测、事件、日志消息记录等。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>
