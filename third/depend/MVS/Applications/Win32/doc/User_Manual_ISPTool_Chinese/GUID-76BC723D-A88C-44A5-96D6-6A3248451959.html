    <h1 class="title topictitle1">校正图像</h1>


    <div class="body conbody"><p class="shortdesc">ISPTool支持使用本地参数或相机参数进行图像校正，也可通过手动标定获取校正参数进行图像校正。</p>

        <div class="note note" id="GUID-76BC723D-A88C-44A5-96D6-6A3248451959__GUID-D4612D75-511E-40C1-B09A-B6F2BB22F6FD"><span class="notetitle">说明</span> 
            <p class="p">本地参数、相机参数及手动标定参数作为校正参数初始化的来源，可根据实际需求进行选择。初始化参数导入后也可进行修改。</p>

        </div>

    </div>
