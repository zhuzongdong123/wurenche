    <h1 class="title topictitle1">对比度</h1>

    
<div class="body conbody"><p class="shortdesc">通过提升对比度可使图像更加清晰，色彩鲜明。</p>

<p class="p">使用对比度模块时可直接进行校正，相关参数如下：</p>

        <dl class="dl parml">
            
                <dt class="dt pt dlterm"><a name="GUID-ADE4840F-BFC9-417F-855B-86336CA0A42F__GUID-635C114D-F01E-4ED2-BF9A-139547A9BC73"><!-- --></a>对比度调节强度</dt>

                <dd class="dd pd">
                    <p class="p">范围为[1，10000]，数值越大，对比度越强。</p>

                </dd>

            
        </dl>
