    <h1 class="title topictitle1">自动枚举网口相机</h1>


<div class="body conbody"><p class="shortdesc">ISPTool可自动枚举局域网内可搜索到的网口相机。</p>

        <p class="p">ISPTool支持每隔30秒对PC网口下的相机进行刷新，同时也可通过设备列表GigE接口右侧的<img class="image icon" id="GUID-C942979D-C9BB-47C9-B084-7968CD470372__IMAGE_M5V_K2F_5QB" src="GUID-B76DD606-B5BB-4178-8613-FD0EB76BB6C5-high.png" />进行手动刷新。</p>

    </div>
