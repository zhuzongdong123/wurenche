    <h1 class="title topictitle1">发版说明</h1>

    
    <div class="body conbody"><p class="shortdesc">本章节主要介绍工具各版本的更新情况。</p>

        <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_FJD_HHW_3ZB">
            <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-C7EF0C6C-BDE7-460E-9BB8-39F1D23D94B8">
                <p class="p"><a class="xref" href="#GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-B021BE62-7346-4023-AFEF-B55F37137F02">V4.4.0</a></p>

            </li>

            <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-552120CA-1D32-414F-82B0-95F4D4D29475">
                <p class="p"><a class="xref" href="#GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-9F0753E4-27F2-4DB0-AAD8-3B42545DC650">V4.3.0</a></p>

            </li>

            <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-DBE021CD-2422-402B-A96B-5A889C9F5694">
                <p class="p"><a class="xref" href="#GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-ABC39061-ACFB-4590-A132-C5E3A8A58BC0">V4.2.0</a></p>

            </li>

        </ul>

        <div class="section" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-B021BE62-7346-4023-AFEF-B55F37137F02"><h2 class="title sectiontitle">V4.4.0</h2>
            
            <p class="p">该版本发布于2024年8月。</p>

            <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_E4W_FFN_HCC">
                <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-B0C556E0-581D-4A2D-9F5A-C44209F1800C">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_DPN_GFN_HCC">
                        <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-8060FF70-0D94-4423-962E-91EA2F695A46">
                            <p class="p">支持XoFLink协议类型采集卡，新增XoFLink勾选选项，具体请见<a class="xref" href="GUID-E47CF0ED-0A90-44E0-AC55-8449BD3064CD.html#GUID-E47CF0ED-0A90-44E0-AC55-8449BD3064CD" title="PCIe诊断工具（本手册简称为“工具”）可对采集卡调试状态信息的内存值进行实时读取。">工具介绍</a>。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-9F0753E4-27F2-4DB0-AAD8-3B42545DC650"><h2 class="title sectiontitle">V4.3.0</h2>
            
            <p class="p">该版本发布于2023年11月。</p>

            <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_JGQ_5GW_3ZB">
                <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-445CF518-BA28-4BFB-8E80-803FA2EE60BF">
                    <p class="p">其他：</p>

                    <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_QJH_VGW_3ZB">
                        <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-43124229-4C14-4E8E-8F80-2A65F83EFF5B">
                            <p class="p">跟随客户端进行版本迭代。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-ABC39061-ACFB-4590-A132-C5E3A8A58BC0"><h2 class="title sectiontitle">V4.2.0</h2>
            
            <p class="p">该版本发布于2023年6月。</p>

            <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_PX2_1TN_HZB">
                <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-55F62123-9085-4211-A08C-5F7A5AEFD719">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__UL_M4Z_1TN_HZB">
                        <li class="li" id="GUID-274219F0-7D3D-4CCA-91A6-BB39C64BDFB7__GUID-66C3D35A-6738-4697-8E26-A1BA2A4FB5BD">
                            <p class="p">提供PCIe诊断工具检查采集卡的PCIe运行状态 。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>
