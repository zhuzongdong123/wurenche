    <h1 class="title topictitle1">工具介绍</h1>

    <div class="body conbody">
        <div class="section" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-4B81CDF2-4171-4581-987B-48C6D1268A84"><h2 class="title sectiontitle">工具介绍</h2>
            
            <p class="p">ISPTool是配合工业相机SDK使用的工具，通过调用SDK生成各种算法的标定文件和配置参数。SDK通过ISPTool生成的配置文件在取图接口内部实现图像ISP算法处理。</p>

        </div>

        <div class="section" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-B3176300-5EA8-481D-BF84-78FE5A12995E"><h2 class="title sectiontitle">主要功能</h2>
            
            <ul class="ul" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__UL_D21_3VD_D3B">
                <li class="li" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-89567BD7-9782-4B99-9A73-CAE3A9B00066">
                    <p class="p">配合工业相机SDK使用，实现取图接口内部的图像ISP算法处理 。</p>

                </li>

                <li class="li" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-A71854E9-556D-4953-ABD1-FCB265425689">
                    <p class="p">支持对图像进行算法标定和校正，并预览校正效果。</p>

                </li>

                <li class="li" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-2072F130-91C0-401A-80F4-44E09E7B4172">
                    <p class="p">支持多个型号相机，满足不同功能需要。</p>

                </li>

                <li class="li" id="GUID-4A707B85-6362-489F-AD0C-12957E57E3F9__GUID-D0197E24-A794-46D3-9642-2836A870436A">
                    <p class="p">支持相机/本地取图模式，适应不同场景需求。</p>

                </li>

            </ul>

        </div>

    </div>
