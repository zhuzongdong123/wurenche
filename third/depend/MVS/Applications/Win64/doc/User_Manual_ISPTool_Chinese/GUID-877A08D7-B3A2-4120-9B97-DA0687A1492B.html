    <h1 class="title topictitle1">图像缩放</h1>

<div class="body conbody">
<p class="p">图像缩放模块支持Super Binning，能够在不影响整体图像效果的前提下放大或缩小图片分辨率，可直接进行校正，相关参数如下：</p>

        <dl class="dl parml">
            
                <dt class="dt pt dlterm"><a name="GUID-877A08D7-B3A2-4120-9B97-DA0687A1492B__GUID-32399F1D-F548-475B-B356-2C71139DA227"><!-- --></a>缩放比例系数</dt>

                <dd class="dd pd">
                    <p class="p">取值范围为[200，2800]。当取值为1000时，图像为原始大小；当取值大于1000时，将缩小图像，缩小倍数为参数值除以1000；当取值小于1000时，将放大图像，放大倍数为1000除以参数值。</p>

                </dd>

            
        </dl>

        <div class="fig fignone" id="GUID-877A08D7-B3A2-4120-9B97-DA0687A1492B__FIG_JDN_42G_5QB">
            
            <img class="image" id="GUID-877A08D7-B3A2-4120-9B97-DA0687A1492B__IMAGE_FS5_P2G_5QB" src="GUID-D7091378-AF2A-4550-99AB-EF3F67422AC8-high.png" width="1000" />
        <span class="figcap">图 1 图像缩放校正参数</span></div>

</div>


</div>
