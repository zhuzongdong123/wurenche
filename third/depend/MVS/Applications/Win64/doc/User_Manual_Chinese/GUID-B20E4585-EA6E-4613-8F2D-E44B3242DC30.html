    <h1 class="title topictitle1">帮助</h1>


<div class="body conbody"><p class="shortdesc">帮助菜单下有语言、用户手册和关于三个操作选项。 </p>

        <dl class="dl parml">
            
                <dt class="dt pt dlterm"><a name="GUID-B20E4585-EA6E-4613-8F2D-E44B3242DC30__GUID-C0318978-2696-48AD-868B-BE6CAD8EEDC4"><!-- --></a>语言</dt>

                <dd class="dd pd">分简体中文和English两种，可对客户端的语言进行切换。</dd>

            
            
                <dt class="dt pt dlterm"><a name="GUID-B20E4585-EA6E-4613-8F2D-E44B3242DC30__GUID-AF1AF395-6182-474A-A5DD-D6F0CEEFD7FB"><!-- --></a>用户手册</dt>

                <dd class="dd pd">可查看客户端的操作手册，从中获取相关功能和设置方法。</dd>

            
            
                <dt class="dt pt dlterm"><a name="GUID-B20E4585-EA6E-4613-8F2D-E44B3242DC30__GUID-DAD7BF7E-B580-451C-8961-7AFE86D1CC96"><!-- --></a>关于</dt>

        </dl>
