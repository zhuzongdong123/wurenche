    <h1 class="title topictitle1">发版说明</h1>

    
<div class="body conbody"><p class="shortdesc">本章节主要介绍工具各版本的更新情况。</p>

        <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_DBW_M5N_HZB">
            <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-1AFD30CA-89F8-42B3-8184-B97100BBDEB6">
                <p class="p"><a class="xref" href="#GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-C7E1302B-66B2-499A-ACC6-6DCEEC65DFDF">V4.4.0</a></p>

            </li>

            <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-63E45E16-D037-4C42-BB6C-2A00B55A9C80">
                <p class="p"><a class="xref" href="#GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-0CEC6535-FF31-4759-BED9-14BCBD068821">V4.3.0</a></p>

            </li>

            <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-C5DC0BC8-CD2C-46FA-A3BE-92AE3BB3809A">
                <p class="p"><a class="xref" href="#GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-C0954E7F-AE02-4F40-99E7-405E5AE7D09B">V4.2.0</a></p>

            </li>

        </ul>

        <div class="section" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-C7E1302B-66B2-499A-ACC6-6DCEEC65DFDF"><h2 class="title sectiontitle">V4.4.0</h2>
            
            <p class="p">该版本发布于2024年8月。</p>

            <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_FQ5_HSL_HCC">
                <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-DC159018-3914-4B54-AD2B-15CE939A417B">
                    <p class="p">其他：</p>

                    <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_XRM_3SL_HCC">
                        <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-1515FF6C-41D3-4EDC-B737-CE7BEB7C2C3A">
                            <p class="p">跟随客户端进行版本迭代。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-0CEC6535-FF31-4759-BED9-14BCBD068821"><h2 class="title sectiontitle">V4.3.0</h2>
            
            <p class="p">该版本发布于2023年11月。</p>

            <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_Q2R_G5N_HZB">
                <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-1083D147-6953-4A1D-B590-C4006F41EF17">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_NHJ_H5N_HZB">
                        <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-478C38E3-7947-4021-9F8E-8976A5F71170">
                            <p class="p">新增采集卡设备的参数配置导入/导出操作，具体请见<a class="xref" href="GUID-3EF2A99D-C9CA-43B7-AEB7-69BED1E1925B.html#GUID-3EF2A99D-C9CA-43B7-AEB7-69BED1E1925B" title="工具可对单个相机或单个采集卡的参数进行导入或导出操作，也可对多个相机或多个采集卡的参数进行批量导入或导出。">导入/导出操作</a>。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

        <div class="section" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-C0954E7F-AE02-4F40-99E7-405E5AE7D09B"><h2 class="title sectiontitle">V4.2.0</h2>
            
            <p class="p">该版本发布于2023年6月。</p>

            <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_QQ3_25N_HZB">
                <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-2868C0E2-AA3C-46DE-B912-15AF58A55F66">
                    <p class="p">功能新增：</p>

                    <ul class="ul" id="GUID-91116238-A36F-4256-8A1E-783638624A83__UL_MMV_25N_HZB">
                        <li class="li" id="GUID-91116238-A36F-4256-8A1E-783638624A83__GUID-312DE29C-4960-459F-8CC1-7752B2B7C495">
                            <p class="p">提供属性导入导出工具对设备的参数配置进行导入/导出等操作。</p>

                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </div>
